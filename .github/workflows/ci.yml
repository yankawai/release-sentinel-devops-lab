name: ci

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/api/go.mod

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Validate YAML
        run: ./scripts/validate-yaml.sh

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Render Helm chart
        run: make helm-template

  container-security:
    name: container-security
    runs-on: ubuntu-latest
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: make build IMAGE=release-sentinel-api:ci APP_VERSION=ci COMMIT_SHA=${GITHUB_SHA::12}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: release-sentinel-api:ci
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: release-sentinel-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
