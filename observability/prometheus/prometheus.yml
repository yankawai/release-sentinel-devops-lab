global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: release-sentinel-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080
        labels:
          service: release-sentinel-api
          environment: local
