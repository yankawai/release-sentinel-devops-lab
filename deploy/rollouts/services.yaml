apiVersion: v1
kind: Service
metadata:
  name: release-sentinel-stable
spec:
  selector:
    app.kubernetes.io/name: release-sentinel
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: release-sentinel-canary
spec:
  selector:
    app.kubernetes.io/name: release-sentinel
  ports:
    - name: http
      port: 80
      targetPort: http
