<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Release Sentinel release flow</title>
  <desc id="desc">A visual release flow from source code to CI checks, image build, canary rollout, Prometheus analysis, and automatic rollback.</desc>
  <rect width="1280" height="520" rx="0" fill="#F8FAFC"/>
  <text x="80" y="80" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800">Release safety loop</text>
  <text x="80" y="114" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Build, scan, deploy, measure, and stop bad releases before full promotion.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#64748B"/>
    </marker>
  </defs>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="80" y="184" width="150" height="110" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="112" y="232" fill="#0F172A" font-size="18" font-weight="700">Code</text>
    <text x="112" y="260" fill="#64748B" font-size="14">Go service</text>

    <line x1="230" y1="239" x2="306" y2="239" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="318" y="184" width="170" height="110" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="354" y="222" fill="#0F172A" font-size="18" font-weight="700">CI gate</text>
    <text x="354" y="250" fill="#64748B" font-size="14">test · vet · helm</text>
    <text x="354" y="272" fill="#64748B" font-size="14">SBOM · Trivy</text>

    <line x1="488" y1="239" x2="564" y2="239" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="576" y="184" width="170" height="110" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="612" y="222" fill="#0F172A" font-size="18" font-weight="700">Image</text>
    <text x="612" y="250" fill="#64748B" font-size="14">distroless</text>
    <text x="612" y="272" fill="#64748B" font-size="14">non-root</text>

    <line x1="746" y1="239" x2="822" y2="239" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="834" y="184" width="170" height="110" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="870" y="222" fill="#0F172A" font-size="18" font-weight="700">Canary</text>
    <text x="870" y="250" fill="#64748B" font-size="14">10% · 50%</text>
    <text x="870" y="272" fill="#64748B" font-size="14">paused analysis</text>

    <line x1="1004" y1="239" x2="1080" y2="239" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="1092" y="184" width="128" height="110" rx="16" fill="#ECFDF5" stroke="#86EFAC"/>
    <text x="1118" y="232" fill="#166534" font-size="18" font-weight="700">Promote</text>
    <text x="1118" y="260" fill="#15803D" font-size="14">healthy</text>

    <path d="M918 294C918 374 766 402 610 402C454 402 356 372 356 314" stroke="#EF4444" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
    <rect x="510" y="354" width="204" height="56" rx="14" fill="#FEF2F2" stroke="#FCA5A5"/>
    <text x="546" y="389" fill="#991B1B" font-size="16" font-weight="700">Abort bad release</text>
  </g>
</svg>
