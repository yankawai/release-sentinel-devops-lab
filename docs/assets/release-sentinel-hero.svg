  <text x="132" y="248" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="54" font-weight="700">Release Sentinel</text>
  <text x="132" y="292" fill="#B8C7D9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23">Canary releases with evidence before promotion.</text>

