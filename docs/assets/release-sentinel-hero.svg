<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Release Sentinel overview</title>
  <desc id="desc">A release safety dashboard showing canary analysis, security checks, and observability signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111F"/>
      <stop offset="0.55" stop-color="#12233A"/>
      <stop offset="1" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="panel" x1="96" y1="112" x2="1184" y2="548" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172A42"/>
      <stop offset="1" stop-color="#101B2C"/>
    </linearGradient>
    <filter id="shadow" x="52" y="68" width="1176" height="524" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
